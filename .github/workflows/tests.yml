# ============================================================
# SAK3R Coaching — Playwright Java CI
# Runs on every push / PR to main or develop
# ============================================================

name: SAK3R Playwright Tests

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30    # kill job if it hangs

    steps:

      # ── 1. Checkout code ─────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 ────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven           # caches ~/.m2 between runs = faster CI

      # ── 3. Install Maven dependencies ────────────────────
      - name: Install dependencies
        run: mvn install -DskipTests -q

      # ── 4. Install Playwright browsers ───────────────────
      - name: Install Playwright browsers
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps chromium"

      # ── 5. Generate config.properties from secrets ───────
      #    Local file is in .gitignore so CI builds it fresh
      - name: Generate config.properties
        run: |
          mkdir -p src/test/resources
          cat > src/test/resources/config.properties << EOF
          # Auto-generated by CI — do not commit
          base.url            = https://saker-coaching.vercel.app/

          user.email          = ${{ secrets.USER_EMAIL }}
          user.password       = ${{ secrets.USER_PASSWORD }}
          owner.email         = ${{ secrets.OWNER_EMAIL }}
          owner.password      = ${{ secrets.OWNER_PASSWORD }}
          coach.email         = ${{ secrets.COACH_EMAIL }}
          coach.password      = ${{ secrets.COACH_PASSWORD }}
          new.user.email      = ${{ secrets.NEW_USER_EMAIL }}
          new.user.password   = ${{ secrets.NEW_USER_PASSWORD }}
          new.user.username   = ${{ secrets.NEW_USER_USERNAME }}

          browser.name        = chromium
          browser.headless    = true
          browser.slow.mo     = 0

          timeout.default     = 15000
          timeout.navigation  = 30000
          timeout.element     = 8000
          timeout.async       = 15000

          report.output.dir   = test-output
          report.html.name    = SAK3R-ExtentReport.html
          screenshots.dir     = test-output/screenshots
          EOF

      # ── 6. Wake up Vercel (cold start protection) ────────
      - name: Wake up Vercel deployment
        run: |
          echo "Pinging SAK3R Coaching site..."
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://saker-coaching.vercel.app/)
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Site is up!"
              break
            fi
            if [ "$i" = "12" ]; then
              echo "Site did not respond after 12 attempts — failing"
              exit 1
            fi
            sleep 10
          done

      # ── 7. Run tests ──────────────────────────────────────
      - name: Run Playwright tests
        run: mvn test
        continue-on-error: true   # let teardown/report steps run even if tests fail

      # ── 8. Upload ExtentReport & screenshots ─────────────
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()              # always upload — even on failure
        with:
          name: SAK3R-Test-Report-${{ github.run_number }}
          path: test-output/
          retention-days: 14      # keep reports for 14 days

      # ── 9. Upload Surefire XML (for GitHub test summary) ─
      - name: Upload Surefire results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-results-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 7

      # ── 10. Print test summary to CI log ─────────────────
      - name: Print test summary
        if: always()
        run: |
          echo "======================================"
          echo "       SAK3R TEST RUN SUMMARY"
          echo "======================================"
          if [ -d target/surefire-reports ]; then
            TOTAL=$(grep -r 'tests=' target/surefire-reports/*.xml | grep -o 'tests="[0-9]*"' | grep -o '[0-9]*' | awk '{s+=$1} END {print s}')
            FAILED=$(grep -r 'failures=' target/surefire-reports/*.xml | grep -o 'failures="[0-9]*"' | grep -o '[0-9]*' | awk '{s+=$1} END {print s}')
            SKIPPED=$(grep -r 'skipped=' target/surefire-reports/*.xml | grep -o 'skipped="[0-9]*"' | grep -o '[0-9]*' | awk '{s+=$1} END {print s}')
            PASSED=$((TOTAL - FAILED - SKIPPED))
            echo "Total   : $TOTAL"
            echo "Passed  : $PASSED"
            echo "Failed  : $FAILED"
            echo "Skipped : $SKIPPED"
          else
            echo "No surefire reports found"
          fi
          echo "======================================"
          echo "Full report: Actions -> Artifacts -> SAK3R-Test-Report-${{ github.run_number }}"
          echo "======================================"
